name: Manual Build RetroWeb Pro
on:
  workflow_dispatch: # 核心修改：只允许手动触发构建，防封号防滥用

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 核心二步：在云端自动下载最新的 Ruffle 离线核心到 App 的内置资源中
    - name: Fetch Local Emulation Cores
      run: |
        mkdir -p app/src/main/assets/ruffle
        echo "正在拉取最强 Flash WebAssembly 离线核心..."
        wget -qO ruffle.zip https://github.com/ruffle-rs/ruffle/releases/latest/download/ruffle-web-selfhosted.zip
        unzip -q ruffle.zip -d app/src/main/assets/ruffle/
        rm ruffle.zip
        echo "Java KEmulator 等核心也可以在此处扩充..."

    - name: Auto-Scaffold Android Environment
      run: |
        cat << 'EOF' > settings.gradle
        pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
        dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
        include ':app'
        EOF
        
        cat << 'EOF' > build.gradle
        plugins { id 'com.android.application' version '8.2.2' apply false }
        EOF
        
        cat << 'EOF' > gradle.properties
        org.gradle.jvmargs=-Xmx6g -XX:+UseParallelGC
        android.useAndroidX=true
        EOF

    - name: Setup Global Gradle Environment
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5'

    - name: Build APK (Overclocked)
      run: gradle assembleDebug --parallel --build-cache

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: RetroWeb-Pro
        path: app/build/outputs/apk/debug/app-debug.apk
        compression-level: 0
