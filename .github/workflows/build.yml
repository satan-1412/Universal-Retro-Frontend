name: Manual Build RetroWeb Pro
on:
  workflow_dispatch: # 纯手动触发，防风控

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 核心修复：通过 API 动态抓取含有日期的最新版 Ruffle 核心真实链接
    - name: Fetch Local Emulation Cores
      run: |
        mkdir -p app/src/main/assets/ruffle
        echo "正在通过 GitHub API 获取最强 Flash 离线核心的最新链接..."
        
        # 自动提取最新版 web-selfhosted.zip 的真实下载地址
        DOWNLOAD_URL=$(curl -s https://api.github.com/repos/ruffle-rs/ruffle/releases | grep "browser_download_url.*web-selfhosted.zip" | head -n 1 | cut -d '"' -f 4)
        
        echo "抓取成功，真实链接为: $DOWNLOAD_URL"
        echo "正在拉取核心文件..."
        wget -qO ruffle.zip "$DOWNLOAD_URL"
        
        echo "正在解压并安装核心..."
        unzip -q ruffle.zip -d app/src/main/assets/ruffle/
        rm ruffle.zip

    - name: Auto-Scaffold Android Environment
      run: |
        cat << 'EOF' > settings.gradle
        pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
        dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
        include ':app'
        EOF
        
        cat << 'EOF' > build.gradle
        plugins { id 'com.android.application' version '8.2.2' apply false }
        EOF
        
        cat << 'EOF' > gradle.properties
        org.gradle.jvmargs=-Xmx6g -XX:+UseParallelGC
        android.useAndroidX=true
        EOF

    - name: Setup Global Gradle Environment
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5'

    - name: Build APK (Overclocked)
      run: gradle assembleDebug --parallel --build-cache

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: RetroWeb-Pro
        path: app/build/outputs/apk/debug/app-debug.apk
        compression-level: 0
