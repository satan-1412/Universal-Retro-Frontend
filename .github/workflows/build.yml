name: Build Android APK (Max Performance)
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # 1. 强制使用最新 v4 抓取代码，速度更快
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 强制使用最新 v4 配置 Java 环境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. 引入 Gradle 官方超频缓存引擎 (替代旧版的普通缓存)
    - name: Setup Gradle with Max Caching
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper

    # 4. 赋予执行权限
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 5. 榨干云端算力：开启多核并行 (--parallel)、构建缓存 (--build-cache)、强制分配 6GB 内存给 JVM
    - name: Build with Gradle (Overclocked)
      run: ./gradlew assembleDebug --parallel --build-cache -Porg.gradle.jvmargs="-Xmx6g -XX:+UseParallelGC"

    # 6. 使用最新 v4 上传产物，关闭压缩以换取最快上传速度
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        compression-level: 0 
