name: Manual Build RetroWeb Pro
on:
  workflow_dispatch: # 纯手动触发，防风控

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fetch Local Emulation Cores (Flash & Java)
      run: |
        echo "创建离线核心目录..."
        mkdir -p app/src/main/assets/ruffle
        mkdir -p app/src/main/assets/java
        
        echo "1. 正在通过 GitHub API 获取最新版 Ruffle 核心..."
        DOWNLOAD_URL=$(curl -s https://api.github.com/repos/ruffle-rs/ruffle/releases | jq -r '.[0].assets[] | select(.name | contains("web-selfhosted")) | .browser_download_url')
        curl -sL -o ruffle.zip "$DOWNLOAD_URL"
        unzip -q ruffle.zip -d app/src/main/assets/ruffle/
        rm ruffle.zip
        
        echo "2. 正在抓取本地 Java 运行核心 (CheerpJ Loader)..."
        # 直接拉取 Java 核心加载器与必要的 Wasm 组件打包进本地
        curl -ksL -o app/src/main/assets/java/cj3loader.js "https://cj3.leaningtech.com/3.0/cj3loader.js"
        # 注意: CheerpJ 内部还会动态请求 wasm, 真正的无网纯离线需要抓取整套运行时。
        # 如果你有自己打包好的完整 Java 离线 zip，可以把上面那行替换成类似这样：
        # curl -ksL -o java_engine.zip "你的私有链接" && unzip java_engine.zip -d app/src/main/assets/java/

    - name: Auto-Scaffold Android Environment
      run: |
        cat << 'EOF' > settings.gradle
        pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
        dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
        include ':app'
        EOF
        
        cat << 'EOF' > build.gradle
        plugins { id 'com.android.application' version '8.2.2' apply false }
        EOF
        
        cat << 'EOF' > gradle.properties
        org.gradle.jvmargs=-Xmx6g -XX:+UseParallelGC
        android.useAndroidX=true
        EOF

    - name: Setup Global Gradle Environment
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5'

    - name: Build APK (Overclocked)
      run: gradle assembleDebug --parallel --build-cache

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: RetroWeb-Pro
        path: app/build/outputs/apk/debug/app-debug.apk
        compression-level: 0
